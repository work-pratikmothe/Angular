@if(showAddTask){
<app-new-task (cancel)="onCancelAddTask()" (add)="addTask($event)"></app-new-task>
}
<section id="tasks">
    <header>
        <h2>{{name()}}</h2>
        <menu>
            <button (click)="onAddTask()">
                Add task
            </button>
        </menu>
    </header>
    <ul>
        @for (task of selectedUserTasks(); track task.id) {
        <li><app-task [task]="task" (onCompleteTask$)="onCompleteTask($event)"></app-task></li>
        }



    </ul>
</section>
