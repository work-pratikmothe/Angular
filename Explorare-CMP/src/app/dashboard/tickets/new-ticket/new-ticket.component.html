<form #form (ngSubmit)="submit()">

    <app-control title="Title">
        <input name="title" id="title" [(ngModel)]="title" />
    </app-control>

    <app-control title="Request">
        <textarea name="request" id="request" rows="3" [(ngModel)]="request"></textarea>
    </app-control>

    <button app-button>
        Submit
        <span class="icon">
            →
        </span>
    </button>

</form>
