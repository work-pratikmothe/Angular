<app-header></app-header>
<main>
  <ul id="users">
    @for(user of users; track user.id){
    <li>
      <app-user (select)="onSelectUser($event)" [user]="user" [selected]="user.id === selectedUserId"></app-user>
    </li>
    }

  </ul>
  @if(selectedUser){
  <app-tasks [selectedUser]="selectedUser"></app-tasks>
  }
  @else {
  <h2 id="fallback">Selected the user to select the tasks !</h2>
  }

</main>
